name: claimy
description: A new Flutter project for insurance and benefits claim automation.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.4.0
  syncfusion_flutter_pdf: ^24.1.41
  google_fonts: ^6.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - assets/images/
  #   - assets/forms/
